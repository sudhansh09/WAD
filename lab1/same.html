<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        body{
            background-color: azure;
        }

        .sidebar{
            height: 100vh;
            position: relative;
        }
        .sidebar a {
            color: black;
            text-decoration: none;
            display: block;
            padding: 12px;
        }

    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- sidebar  -->
            <div class="col-md-2 sidebar p-0">
                <img src="./I²IT-Logo-New.png" alt="clg logo" class="img-fluid my-3 d-block mx-auto" style="width: 80px;">
                <h4 class="text-white text-center py-3"><u><a href="https://www.isquareit.edu.in/">I2IT</a></u></h4>
                <a href="#">Dashboard</a>
                <a href="#">Admission</a>
                <a href="#">About Clg</a>
                <a href="#">Log out</a>
            </div>

            <!-- main content -->
             <div class="col-md-10 p-4">
                <h2 class="mb-4 text-decoration">Dashboard</h2>

                <div class="row g-4">
                    <div class="col-md-3">
                        <div class="card text-decoration bg-primary">
                            <div class="card-body">
                                <h5>Total Students</h5>
                                <h3>1200k+</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-success">
                            <div class="card-body">
                                <h5>Placed Students</h5>
                                <h3>45K+</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-danger">
                            <div class="card-body">
                                <h5>Company Drive</h5>
                                <h3>45K+</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card bg-warning">
                            <div class="card-body">
                                <h5>Avg package</h5>
                                <h3>20 LPA</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <table class="table table-bordered p-5 mt-5 table-striped">
                    <thead>
                        <th class="bg-success">Student ID</th>
                        <th class="bg-success">Admission Amount</th>
                        <th class="bg-success">Date of Admission</th>
                        <th class="bg-success">Status</th>
                    </thead>
                    <tbody>
                        
                    </tbody>
                </table>
             </div>
        </div>
    </div>
</body>
</html>
