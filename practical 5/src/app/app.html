<div class="main-container">
  <!-- LEFT SIDE -->
  <div class="form-section">
    <h1>📝 Registration Form</h1>

    <div class="input-group">
      <label>Name</label>
      <input type="text" #name required>
    </div>

    <div class="input-group">
      <label>Address</label>
      <input type="text" #address required>
    </div>

    <div class="input-group">
      <label>Mobile</label>
      <input type="text" #mobile required>
    </div>

    <div class="input-group">
      <label>Email</label>
      <input type="text" #email required>
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" #password required>
    </div>

    <button (click)="getValue(name.value , address.value , mobile.value , email.value)">
      Register 🚀
    </button>
  </div>

  <!-- RIGHT SIDE -->
  <div class="result-section">
    <h1>📊 Registered Data</h1>

    <div class="card">
      <p><strong>Name:</strong> {{displayName}}</p>
      <p><strong>Address:</strong> {{displayAddress}}</p>
      <p><strong>Mobile:</strong> {{displayMobile}}</p>
      <p><strong>Email:</strong> {{displayEmail}}</p>
    </div>
  </div>
</div>
